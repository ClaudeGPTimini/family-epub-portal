<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request a Book | Family EPUB Library</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Family EPUB Library home">
        <span class="brand-mark" aria-hidden="true">F</span>
        <span>Family EPUB Library</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html#latest">Latest</a>
        <a href="index.html#status">Status</a>
      </nav>
    </header>

    <main class="request-page">
      <section class="request-panel" aria-labelledby="request-title">
        <p class="eyebrow">Book request</p>
        <h1 id="request-title">Request a book.</h1>
        <p>No account or email address is required. Add as much detail as you know.</p>
        <div class="form-alert" id="requestAlert" role="status"></div>
        <form class="request-form" id="bookRequestForm" method="post" target="requestFrame">
          <label>
            <span>Title</span>
            <input name="title" required autocomplete="off" />
          </label>
          <label>
            <span>Author</span>
            <input name="author" autocomplete="off" />
          </label>
          <label>
            <span>ISBN</span>
            <input name="isbn" autocomplete="off" />
          </label>
          <label>
            <span>Authorized EPUB URL</span>
            <input name="source_url" type="url" placeholder="https://example.com/book.epub" />
          </label>
          <label>
            <span>Notes</span>
            <textarea name="notes" rows="4"></textarea>
          </label>
          <label class="hp-field" aria-hidden="true">
            <span>Leave this blank</span>
            <input name="website" tabindex="-1" autocomplete="off" />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">
              <i data-lucide="send" aria-hidden="true"></i>
              Send Request
            </button>
            <a class="button quiet" href="index.html">
              <i data-lucide="arrow-left" aria-hidden="true"></i>
              Back
            </a>
          </div>
        </form>
        <iframe class="submit-frame" id="requestFrame" name="requestFrame" title="Request submission"></iframe>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="request.js"></script>
  </body>
</html>
